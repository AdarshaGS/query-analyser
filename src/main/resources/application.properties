# Database Configuration
# For H2 (in-memory) - use for development
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# For MySQL (uncomment when MySQL is available)
spring.datasource.url=jdbc:mysql://localhost:3306/cim?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:mysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.database=mysql

# Server Configuration
server.port=8080

# Lombok
lombok.addGeneratedAnnotation=true

# Anthropic Claude API Configuration (from Claude Code environment variables)
anthropic.base.url=http://localhost:8082
anthropic.auth.token=freecc

# Model fallback configuration
ai.model.list=claude-3-5-sonnet-20241022,claude-3-opus-20240229,deepseek-chat
ai.model.max-attempts=3

# To activate Claude provider instead of Ollama
spring.profiles.active=claude

# Encryption key for database passwords (base64 encoded 256-bit key)
db.encryption.key=${DB_ENCRYPTION_KEY:base64encodedkeyplaceholder}
# spring.profiles.active=claude

spring.ai.mcp.server.name=sql-optimizer-mcp
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC